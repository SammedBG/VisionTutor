# ============================================
# VisionTutor - GitHub Actions CI/CD
# Deploys backend to Cloud Run on push to main
# ============================================

name: Deploy VisionTutor

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  BACKEND_SERVICE: visiontutor-backend
  BACKEND_IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/visiontutor-backend

jobs:
  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker

      - name: Build and Push Docker image
        run: |
          cd backend
          docker build -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} .
          docker build -t ${{ env.BACKEND_IMAGE }}:latest .
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.BACKEND_IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --image=${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --port=8000 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=5 \
            --timeout=900 \
            --set-env-vars="DEBUG=false" \
            --set-env-vars="ALLOWED_ORIGINS=*" \
            --set-secrets="GEMINI_API_KEY=gemini-api-key:latest"

      - name: Show deployment URL
        run: |
          URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "Backend deployed at: $URL"
          echo "::notice title=Deployment::Backend URL: $URL"
